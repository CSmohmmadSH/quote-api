name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging        # uses staging env secrets

    steps:
      - name: Trigger Render staging deploy
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Staging deploy triggered"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging        # waits for staging to finish
    environment: production      # triggers approval gate

    steps:
      - name: Trigger Render production deploy
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Production deploy triggered"