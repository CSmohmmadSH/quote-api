name: CD — Blue-Green Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-blue:
    name: Deploy to Blue (Staging)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Trigger blue slot deploy
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Blue slot deploy triggered"

      - name: Verify blue slot is healthy
        run: |
          sleep 30
          curl -f https://quote-api-staging-y816.onrender.com/health
          echo "Blue slot is healthy"

  swap-to-green:
    name: Swap Traffic to Green (Production)
    runs-on: ubuntu-latest
    needs: deploy-blue          # waits for blue to be healthy
    environment: production     # requires your manual approval

    steps:
      - name: Trigger green slot deploy
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Green slot deploy triggered — traffic swapped"